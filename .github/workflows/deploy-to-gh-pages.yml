name: Build and deploy to GitHub Pages
on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          REACT_APP_SUPABASE_URL: ${{ secrets.REACT_APP_SUPABASE_URL }}
          REACT_APP_SUPABASE_ANON_KEY: ${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}
        run: npm run build

      # Detect the build output folder.
      # Create React App outputs to ./build; Vite outputs to ./dist.
      # The variable PUBLISH_DIR is set to whichever folder exists after the
      # build step so the deploy action always publishes the correct folder.
      - name: Detect build output folder
        id: detect_dir
        run: |
          if [ -d "./build" ]; then
            echo "PUBLISH_DIR=./build" >> "$GITHUB_ENV"
            echo "::notice::Detected build output: ./build"
          elif [ -d "./dist" ]; then
            echo "PUBLISH_DIR=./dist" >> "$GITHUB_ENV"
            echo "::notice::Detected build output: ./dist"
          else
            echo "ERROR: Neither ./build nor ./dist directory was found after the build step."
            echo "Check that 'npm run build' succeeded and that the output folder matches one of these paths."
            exit 1
          fi

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ env.PUBLISH_DIR }}
